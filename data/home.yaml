banner:
  title: "SLCC Global — Specialists in Branded Merchandise & Business Solutions"
  lead: "SLCC Global provides tailored solutions focused on branded merchandise, helping businesses strengthen brand identity through high-quality, customised products. Our core offering centres on the design, sourcing, and delivery of promotional items including apparel, bags, accessories, and corporate gifts.
Alongside merchandise, we support clients with showroom design and event planning, ensuring that products, spaces, and experiences work together to maximise brand impact and customer engagement."
  image: /images/hero2.png

about_us:
  title: "About Us"
  image: "/images/business_consultancy.jpg"
  paragraphs:
    - "SLCC Global is a consultancy with a strong focus on branded merchandise and product-based brand solutions. We specialise in helping organisations translate their brand identity into physical products that can be used, worn, and shared."
    - "Our team combines industry experience in sourcing, design, and production with strategic thinking, enabling us to deliver practical and commercially viable solutions."
    - "We believe that successful projects are built on collaboration. By working closely with our clients throughout the process, we ensure that each solution reflects both operational realities and long-term business goals."
    - "We work closely with clients to ensure that every product and project aligns with both brand positioning and operational needs."

clients:
  title: "Our Clients"
  paragraphs:
    - "Our clients are at the centre of our work. We support organisations in strengthening brand presence through a combination of consultancy and high-quality branded merchandise, tailored to their specific objectives and operational needs"
    - "We work across sectors including retail, automotive, and hospitality, adapting our solutions to different commercial environments. This enables us to deliver merchandise and brand strategies that are practical, relevant, and effective."
    - "In addition to consultancy, we provide customised products that support marketing, events, and daily operations. Our focus is on delivering tangible, consistent outcomes that enhance brand visibility across real-world settings."

recommended:
  title: "Services We Offer"
  cards:
    - image: "/images/onlinee-merchandising.jpg"
      title: "Merchandising"
      text: "Our merchandising services help businesses improve product presentation across both physical and digital channels. From display strategy to online retail support, we help brands increase visibility and support sales performance."

    - image: "/images/event-planning.jpg"
      title: "Event planning"
      text: "We provide comprehensive event planning support, including venue selection, event logistics, registration management, and exhibition coordination. Our goal is to deliver well-organised events that strengthen brand engagement and professional relationships."

    - image: "/images/showroom-design.jpg"
      title: "Showroom design"
      text: "The design and operation of a showroom strongly influence how customers perceive your products. We create showroom environments that present products clearly, guide customer movement naturally, and strengthen brand identity."
